services:
  czytnik:
    build: .
    image: czytnik:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Application: ${CONNECTION_STRING}
      Stripe__PublishableKey: ${STRIPE_PUBLISHABLE_KEY}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET}
      Email__Host: ${EMAIL_HOST}
      Email__Port: ${EMAIL_PORT}
      Email__Username: ${EMAIL_USERNAME}
      Email__Password: ${EMAIL_PASSWORD}
      Email__UseSsl: ${EMAIL_USESSL}
      Email__From: ${EMAIL_FROM}
    volumes:
      - ./uploads:/app/wwwroot/uploads

  mailpit:
    image: axllent/mailpit:latest
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"

  stripe-cli:
    image: stripe/stripe-cli:latest
    profiles: ["dev"]
    depends_on:
      - czytnik
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
    command: listen --forward-to http://czytnik:8080/Checkout/Webhook
